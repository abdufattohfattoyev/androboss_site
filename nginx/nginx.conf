# Bu fayl samsebwebning nginx.conf fayliga qo'shiladi
# /root/samsebweb/nginx/nginx.conf ichiga http { } bloki oxiriga joylashtiring

    server {
        listen 80;
        server_name andro-boss.uz www.andro-boss.uz;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name andro-boss.uz www.andro-boss.uz;

        ssl_certificate     /etc/letsencrypt/live/andro-boss.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/andro-boss.uz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        client_max_body_size 50M;

        location / {
            proxy_pass http://androboss:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
